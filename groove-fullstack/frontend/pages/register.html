<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Groove</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
<div class="auth-card">
  <div class="auth-logo"><i class="ti ti-vinyl"></i> Groove</div>
  <h2>Create an account</h2>
  <p class="subtitle">Join Groove and start listening</p>
  <div id="alert-box"></div>
  <form id="register-form">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="cooluser123" required minlength="3">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary" id="reg-btn">Create Account</button>
  </form>
  <div class="auth-switch">Already have an account? <a href="/pages/login.html">Sign in</a></div>
</div>
<script src="/js/api.js"></script>
<script>
  if (getToken()) window.location.href = '/';
  document.getElementById('register-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const data = await apiPost('/auth/register', {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      setToken(data.token); setUser(data.user);
      window.location.href = '/';
    } catch (err) {
      showAlert('alert-box', err.message, 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  };
</script>
</body>
</html>
